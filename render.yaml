services:
  # ── Backend API ───────────────────────────────────────────────────────────────
  - type: web
    name: dealiq-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ZOHO_CLIENT_ID
        sync: false
      - key: ZOHO_CLIENT_SECRET
        sync: false
      - key: ZOHO_REDIRECT_URI
        value: https://dealiq-api.onrender.com/auth/callback
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_REDIRECT_URI
        value: https://dealiq-api.onrender.com/ms-auth/callback
      - key: OUTLOOK_USER_EMAIL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CRM_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: USE_ALEMBIC
        value: "false"
